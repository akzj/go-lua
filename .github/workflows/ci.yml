name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24', '1.25', '1.26']

    steps:
    - uses: actions/checkout@v4

    - name: Build reference C Lua (bccompare / vmcompare)
      working-directory: lua-master
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends build-essential
        make -j"$(nproc)" clean
        # Override CFLAGS so we do not use -march=native (runner-dependent).
        make -j"$(nproc)" \
          CFLAGS='-Wall -O2 -std=c99 -DLUA_USE_LINUX -O2 -fno-stack-protector -fno-common'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test ./... -timeout 120s

    - name: Test Race
      run: go test ./pkg/lua/... -race -timeout 120s

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build
      run: go build ./...
